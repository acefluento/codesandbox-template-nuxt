<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Red accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#D7263D"/>
  <!-- Spade mark (centered, large) -->
  <g transform="translate(600,270) scale(3.2)">
    <path fill="#D7263D"
      d="M0 -70
         C0 -70 -48 -36 -48 -2
         A16 16 0 0 0 -10 12
         C-14 24 -20 30 -34 34
         H34 C20 30 14 24 10 12
         A16 16 0 0 0 48 -2
         C48 -36 0 -70 0 -70Z"/>
  </g>
  <!-- Wordmark -->
  <text x="600" y="390"
    font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Arial,sans-serif"
    font-size="72" font-weight="800" letter-spacing="-1.5"
    text-anchor="middle" fill="white">Ace<tspan fill="#D7263D">fluento</tspan></text>
  <!-- Tagline -->
  <text x="600" y="455"
    font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Arial,sans-serif"
    font-size="28" font-weight="400" letter-spacing="0.5"
    text-anchor="middle" fill="white" opacity="0.45">Websites, Marketing &amp; Growth Systems</text>
</svg>
